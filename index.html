<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon TCG Art Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #FFD700;
      --blue: #1a6fc4;
      --red: #e63946;
      --dark: #1a1a2e;
      --surface: #16213e;
      --card-bg: #0f3460;
      --text: #f0f0f0;
      --muted: #a0aec0;
      --accent: #e94560;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 3px solid var(--yellow);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.12) 0%, transparent 70%);
    }

    h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 3px;
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.3);
      position: relative;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
      position: relative;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1.2rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      align-items: center;
      justify-content: center;
    }

    .controls input[type="text"] {
      flex: 1;
      min-width: 180px;
      max-width: 340px;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,215,0,0.3);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input[type="text"]:focus {
      border-color: var(--yellow);
    }

    .controls input::placeholder { color: var(--muted); }

    .controls select {
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,215,0,0.3);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }

    .controls select option { background: var(--dark); }

    button {
      padding: 0.55rem 1.4rem;
      border-radius: 999px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:active { transform: scale(0.96); }

    #searchBtn {
      background: var(--yellow);
      color: var(--dark);
      box-shadow: 0 0 16px rgba(255,215,0,0.35);
    }

    #searchBtn:hover { box-shadow: 0 0 24px rgba(255,215,0,0.55); }

    #randomBtn {
      background: var(--accent);
      color: #fff;
    }

    #randomBtn:hover { opacity: 0.88; }

    .stats-bar {
      text-align: center;
      padding: 0.6rem;
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      min-height: 2.2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 1.8rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.08);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px) rotate(-0.5deg);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      border-color: rgba(255,215,0,0.4);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: linear-gradient(135deg, #0d1b2a, #1a3a5c);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .card:hover .card-img-wrap img { transform: scale(1.04); }

    .type-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-info {
      padding: 0.75rem 0.9rem 0.9rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-name {
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: var(--yellow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-series {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist-line {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      font-size: 0.8rem;
      color: #7ec8e3;
    }

    .artist-line span { font-weight: 600; }

    .hp-line {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .hp-line b { color: var(--accent); }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }

    .pokeball-spin {
      font-size: 3rem;
      display: block;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: rgba(255,255,255,0.12);
    }

    /* Type colors */
    .t-Fire    { background:#e25822; color:#fff; }
    .t-Water   { background:#1a6fc4; color:#fff; }
    .t-Grass   { background:#3d7d44; color:#fff; }
    .t-Lightning { background:#f0c000; color:#1a1a2e; }
    .t-Psychic { background:#a050d0; color:#fff; }
    .t-Fighting{ background:#c06030; color:#fff; }
    .t-Darkness{ background:#502040; color:#fff; }
    .t-Metal   { background:#808090; color:#fff; }
    .t-Dragon  { background:#4060e0; color:#fff; }
    .t-Fairy   { background:#e080c0; color:#1a1a2e; }
    .t-Colorless { background:#b0a0a0; color:#1a1a2e; }
    .t-default { background:rgba(255,255,255,0.15); color:#fff; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      border: 2px solid rgba(255,215,0,0.25);
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .modal-top {
      display: flex;
      gap: 1.2rem;
      padding: 1.5rem;
      align-items: flex-start;
    }

    .modal-img {
      width: 160px;
      flex-shrink: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .modal-img img { width: 100%; display: block; }

    .modal-details { flex: 1; min-width: 0; }

    .modal-name {
      font-family: 'Bangers', cursive;
      font-size: 1.9rem;
      letter-spacing: 2px;
      color: var(--yellow);
      line-height: 1.1;
    }

    .modal-set {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .modal-rows { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }

    .modal-row {
      display: flex;
      gap: 8px;
      font-size: 0.88rem;
    }

    .modal-row .lbl {
      color: var(--muted);
      min-width: 80px;
      flex-shrink: 0;
    }

    .modal-row .val { color: var(--text); font-weight: 600; }

    .modal-footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    #closeModal {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #closeModal:hover { background: rgba(255,255,255,0.18); }


    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<header>
  <h1>Arte del TCG de Pokémon</h1>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search a Pokémon (e.g. Charizard, Mewtwo…)" />
  <select id="typeFilter">
    <option value="">All types</option>
    <option value="Fire">🔥 Fire</option>
    <option value="Water">💧 Water</option>
    <option value="Grass">🌿 Grass</option>
    <option value="Lightning">⚡ Lightning</option>
    <option value="Psychic">🔮 Psychic</option>
    <option value="Fighting">🥊 Fighting</option>
    <option value="Darkness">🌑 Darkness</option>
    <option value="Dragon">🐉 Dragon</option>
    <option value="Fairy">🧚 Fairy</option>
    <option value="Metal">⚙️ Metal</option>
    <option value="Colorless">⚪ Colorless</option>
  </select>
  <button id="searchBtn">Search</button>
  <button id="randomBtn">🎲 Random</button>
</div>



<div class="stats-bar" id="statsBar">Enter a Pokémon name or click 🎲 Random to start exploring!</div>

<div class="grid" id="grid">
  <div class="empty">🎴 Your cards will appear here</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-top">
      <div class="modal-img"><img id="mImg" src="" alt="" /></div>
      <div class="modal-details">
        <div class="modal-name" id="mName"></div>
        <div class="modal-set" id="mSet"></div>
        <div class="modal-rows">
          <div class="modal-row"><span class="lbl">Illustrator</span><span class="val" id="mArtist"></span></div>
          <div class="modal-row"><span class="lbl">HP</span><span class="val" id="mHp"></span></div>
          <div class="modal-row"><span class="lbl">Type</span><span class="val" id="mType"></span></div>
          <div class="modal-row"><span class="lbl">Rarity</span><span class="val" id="mRarity"></span></div>
          <div class="modal-row"><span class="lbl">Number</span><span class="val" id="mNum"></span></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button id="closeModal">Close</button>
    </div>
  </div>
</div>


<script>
 
  const API_KEY = "a3501852-38cc-4ed8-9c51-a1f932c1a9a3"; // <-- paste your free API key here (optional but recommended) 
  // (Nada de opcional claudia si no la pongo no funciona nomas)
  const BASE_URL = "https://api.pokemontcg.io/v2/cards";

  const grid = document.getElementById("grid");
  const statsBar = document.getElementById("statsBar");
  const searchInput = document.getElementById("searchInput");
  const typeFilter = document.getElementById("typeFilter");
  const overlay = document.getElementById("modalOverlay");

  // Fetch cards from the API
  async function fetchCards(query, type) {
    grid.innerHTML = `<div class="loading"><span class="pokeball-spin">⚽</span>Loading cards…</div>`;
    statsBar.textContent = "Fetching from pokemontcg.io…";

    // Build the query string for the API
    // The API uses "q" parameter for filtering, e.g: q=name:charizard types:Fire
    let q = "";
    if (query) q += `name:${query}*`;
    if (type)  q += (q ? " " : "") + `types:${type}`;
    if (!q)    q = "name:*"; // get everything if no filter

    // Build the full URL with parameters
    // pageSize controls how many cards we get back (max 250)
    const url = `${BASE_URL}?q=${encodeURIComponent(q)}&pageSize=32&orderBy=-set.releaseDate`;

    // Set up headers — include API key if we have one
    const headers = { "Content-Type": "application/json" };
    if (API_KEY) headers["X-Api-Key"] = API_KEY;

    try {
      // This is the actual API call using fetch()
      const response = await fetch(url, { headers });
      const data = await response.json(); // parse the JSON response

      if (!data.data || data.data.length === 0) {
        grid.innerHTML = `<div class="empty">😕 No cards found. Try a different search!</div>`;
        statsBar.textContent = "No results found.";
        return;
      }

      statsBar.textContent = `Showing ${data.data.length} of ${data.totalCount} cards found`;
      renderCards(data.data);

    } catch (err) {
      grid.innerHTML = `<div class="empty">❌ Error connecting to the API. Check your internet connection.<br><small>${err.message}</small></div>`;
      statsBar.textContent = "Error fetching data.";
    }
  }

  // Build the visual cards from the API data
  function renderCards(cards) {
    grid.innerHTML = "";
    cards.forEach(card => {
      const type = card.types ? card.types[0] : null;
      const typeClass = type ? `t-${type}` : "t-default";
      const artist = card.artist || "Unknown";
      const hp = card.hp ? `HP <b>${card.hp}</b>` : "";

      const imgSrc = card.images?.small || "";

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div class="card-img-wrap">
          ${imgSrc
            ? `<img src="${imgSrc}" alt="${card.name}" loading="lazy" />`
            : `<div class="no-img">🎴</div>`}
          ${type ? `<span class="type-badge ${typeClass}">${type}</span>` : ""}
        </div>
        <div class="card-info">
          <div class="card-name">${card.name}</div>
          <div class="card-series">${card.set?.name || ""} · ${card.rarity || "—"}</div>
          <div class="artist-line">🎨 <span>${artist}</span></div>
          ${hp ? `<div class="hp-line">${hp}</div>` : ""}
        </div>
      `;

      // Clicking a card opens the detail modal 
      //ver como hacer para que pueda hacerle click al artista
      div.addEventListener("click", () => openModal(card));
      grid.appendChild(div);
    });
  }

  // Open the detail modal for a card
  function openModal(card) {
    document.getElementById("mImg").src = card.images?.large || card.images?.small || "";
    document.getElementById("mImg").alt = card.name;
    document.getElementById("mName").textContent = card.name;
    document.getElementById("mSet").textContent = `${card.set?.name || ""} · ${card.set?.series || ""}`;
    document.getElementById("mArtist").textContent = card.artist || "Unknown";
    document.getElementById("mHp").textContent = card.hp || "—";
    document.getElementById("mType").textContent = card.types?.join(", ") || "—";
    document.getElementById("mRarity").textContent = card.rarity || "—";
    document.getElementById("mNum").textContent = `${card.number} / ${card.set?.printedTotal || "?"}`;
    overlay.classList.add("open");
  }

  // Random search — picks a random popular Pokémon
  //ver como hacer que sea en verdad random y que me pueda salir un Muk idk
  function randomSearch() {
    const picks = ["Pikachu","Charizard","Mewtwo","Eevee","Gengar","Snorlax",
                   "Bulbasaur","Squirtle","Jigglypuff","Umbreon","Sylveon",
                   "Lucario","Garchomp","Rayquaza","Mew","Alakazam","Gyarados"];
    const pick = picks[Math.floor(Math.random() * picks.length)];
    searchInput.value = pick;
    typeFilter.value = "";
    fetchCards(pick, "");
  }

  // Event listeners
  document.getElementById("searchBtn").addEventListener("click", () => {
    fetchCards(searchInput.value.trim(), typeFilter.value);
  });

  document.getElementById("randomBtn").addEventListener("click", randomSearch);

  searchInput.addEventListener("keydown", e => {
    if (e.key === "Enter") fetchCards(searchInput.value.trim(), typeFilter.value);
  });

  document.getElementById("closeModal").addEventListener("click", () => {
    overlay.classList.remove("open");
  });

  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.remove("open");
  });

  // Carga cartas en especifico al cargar la pagina,
  fetchCards("");
</script>

</body>
</html>
