<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon TCG Art Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #FFD700;
      --blue: #1a6fc4;
      --red: #e63946;
      --dark: #1a1a2e;
      --surface: #16213e;
      --card-bg: #0f3460;
      --text: #f0f0f0;
      --muted: #a0aec0;
      --accent: #e94560;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-bottom: 3px solid var(--yellow);
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.12) 0%, transparent 70%);
    }

    h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(2.5rem, 6vw, 4rem);
      letter-spacing: 3px;
      color: var(--yellow);
      text-shadow: 3px 3px 0 var(--red), 6px 6px 0 rgba(0,0,0,0.3);
      position: relative;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 0.4rem;
      font-size: 0.95rem;
      position: relative;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      padding: 1.2rem 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      align-items: center;
      justify-content: center;
    }

    .controls input[type="text"] {
      flex: 1;
      min-width: 160px;
      max-width: 300px;
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,215,0,0.3);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .controls input[type="text"]:focus {
      border-color: var(--yellow);
    }

    .controls input::placeholder { color: var(--muted); }

    .controls select {
      padding: 0.55rem 1rem;
      border-radius: 999px;
      border: 1.5px solid rgba(255,215,0,0.3);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }

    .controls select option { background: var(--dark); }

    button {
      padding: 0.55rem 1.4rem;
      border-radius: 999px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    button:active { transform: scale(0.96); }

    #searchBtn {
      background: var(--yellow);
      color: var(--dark);
      box-shadow: 0 0 16px rgba(255,215,0,0.35);
    }

    #searchBtn:hover { box-shadow: 0 0 24px rgba(255,215,0,0.55); }

    #randomBtn {
      background: var(--accent);
      color: #fff;
    }

    #randomBtn:hover { opacity: 0.88; }

    .stats-bar {
      text-align: center;
      padding: 0.6rem;
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--dark);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      min-height: 2.2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      padding: 1.8rem 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.08);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px) rotate(-0.5deg);
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      border-color: rgba(255,215,0,0.4);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: linear-gradient(135deg, #0d1b2a, #1a3a5c);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .card:hover .card-img-wrap img { transform: scale(1.04); }

    .type-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .card-info {
      padding: 0.75rem 0.9rem 0.9rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-name {
      font-family: 'Bangers', cursive;
      font-size: 1.2rem;
      letter-spacing: 1px;
      color: var(--yellow);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-series {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist-line {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
      font-size: 0.8rem;
      color: #7ec8e3;
    }

    .artist-line span { font-weight: 600; }

    /* Clicking an artist name searches for other cards by that artist */
    .artist-click {
      cursor: pointer;
      text-decoration: underline dotted;
      text-decoration-color: rgba(126,200,227,0.5);
    }
    .artist-click:hover { color: var(--yellow); }

    .hp-line {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .hp-line b { color: var(--accent); }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }

    .pokeball-spin {
      font-size: 3rem;
      display: block;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: rgba(255,255,255,0.12);
    }

    /* Type colors */
    .t-Fire    { background:#e25822; color:#fff; }
    .t-Water   { background:#1a6fc4; color:#fff; }
    .t-Grass   { background:#3d7d44; color:#fff; }
    .t-Lightning { background:#f0c000; color:#1a1a2e; }
    .t-Psychic { background:#a050d0; color:#fff; }
    .t-Fighting{ background:#c06030; color:#fff; }
    .t-Darkness{ background:#502040; color:#fff; }
    .t-Metal   { background:#808090; color:#fff; }
    .t-Dragon  { background:#4060e0; color:#fff; }
    .t-Fairy   { background:#e080c0; color:#1a1a2e; }
    .t-Colorless { background:#b0a0a0; color:#1a1a2e; }
    .t-default { background:rgba(255,255,255,0.15); color:#fff; }

    /* ===== Modal (carta en detalle) ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      border: 2px solid rgba(255,215,0,0.25);
      max-width: 760px;   /* mas grande que antes */
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* Imagen arriba y centrada, texto abajo */
    .modal-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.6rem;
      padding: 2rem 1.8rem 1.2rem;
    }

    .modal-img {
      width: min(320px, 78%);
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(0,0,0,0.55);
      margin-bottom: 0.4rem;
    }

    .modal-img img { width: 100%; display: block; }

    .modal-name {
      font-family: 'Bangers', cursive;
      font-size: 2.1rem;
      letter-spacing: 2px;
      color: var(--yellow);
      line-height: 1.1;
    }

    .modal-set {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .modal-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 6px;
    }

    .badge {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 4px 13px;
      font-size: 0.8rem;
      color: var(--text);
    }

    .badge-artist {
      cursor: pointer;
      border-color: rgba(255,215,0,0.35);
      color: #7ec8e3;
    }
    .badge-artist:hover { background: rgba(255,215,0,0.12); color: var(--yellow); }

    /* Cuerpo con la info "premio" — lo que diferencia el detalle de la vista rapida */
    .modal-body {
      padding: 0.2rem 1.8rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .modal-section h4 {
      font-family: 'Bangers', cursive;
      letter-spacing: 1px;
      color: var(--yellow);
      font-size: 1.05rem;
      margin-bottom: 0.5rem;
    }

    .ability, .attack {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 0.65rem 0.9rem;
      margin-bottom: 0.5rem;
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .attack-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5rem;
    }

    .dmg { color: var(--accent); font-weight: 700; white-space: nowrap; }

    .tag {
      font-size: 0.68rem;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 1px 8px;
      margin-left: 6px;
    }

    .wrr-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .wrr {
      font-size: 0.8rem;
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      padding: 4px 11px;
    }

    .flavor {
      font-style: italic;
      color: var(--muted);
      text-align: center;
      font-size: 0.85rem;
      padding: 0 0.5rem;
    }

    .modal-footer {
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
    }

    #closeModal {
      background: rgba(255,255,255,0.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #closeModal:hover { background: rgba(255,255,255,0.18); }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 0.82rem;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

<header>
  <h1>Arte del TCG de Pokémon</h1>
</header>

<div class="controls">
  <input type="text" id="searchInput" placeholder="Search a Pokémon (e.g. Charizard, Mewtwo…)" />
  <input type="text" id="artistInput" placeholder="Filtrar por artista…" />
  <select id="typeFilter">
    <option value="">All types</option>
    <option value="Fire">Fire</option>
    <option value="Water">Water</option>
    <option value="Grass">Grass</option>
    <option value="Lightning">Lightning</option>
    <option value="Psychic">Psychic</option>
    <option value="Fighting">Fighting</option>
    <option value="Darkness">Darkness</option>
    <option value="Dragon">Dragon</option>
    <option value="Fairy">Fairy</option>
    <option value="Metal">Metal</option>
    <option value="Colorless"> Colorless</option>
  </select>
  <select id="sortFilter">
    <option value="name">Ordenar: Nombre (A-Z)</option>
    <option value="artist">Ordenar: Artista (A-Z)</option>
    <option value="-hp">Ordenar: HP (mayor a menor)</option>
    <option value="hp">Ordenar: HP (menor a mayor)</option>
    <option value="-set.releaseDate">Ordenar: Mas nuevas primero</option>
  </select>
  <button id="searchBtn">Search</button>
  <button id="randomBtn">🎲 Random</button>
</div>

<div class="stats-bar" id="statsBar">Enter a Pokémon name or click Random to start exploring!</div>

<div class="grid" id="grid">
  <div class="empty"> Your cards will appear here</div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-top">
      <div class="modal-img"><img id="mImg" src="" alt="" /></div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-set" id="mSet"></div>
      <div class="modal-badges" id="mBadges"></div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-footer">
      <button id="closeModal">Close</button>
    </div>
  </div>
</div>

<footer>
  Data from <strong>pokemontcg.io API</strong> · School project · Pokémon and all related names are trademarks of Nintendo/Game Freak.
</footer>

<script>

  const API_KEY = "a3501852-38cc-4ed8-9c51-a1f932c1a9a3"; // <-- paste your free API key here (optional but recommended)
  // (Nada de opcional claudia si no la pongo no funciona nomas)
  const BASE_URL = "https://api.pokemontcg.io/v2/cards";

  const grid = document.getElementById("grid");
  const statsBar = document.getElementById("statsBar");
  const searchInput = document.getElementById("searchInput");
  const artistInput = document.getElementById("artistInput");
  const typeFilter = document.getElementById("typeFilter");
  const sortFilter = document.getElementById("sortFilter");
  const overlay = document.getElementById("modalOverlay");

  // Fetch cards from the API
  async function fetchCards(query, type, artist) {
    grid.innerHTML = `<div class="loading"><span class="pokeball-spin"><svg width="48" height="48" viewBox="0 0 595.3 594.1">
    <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" id="Pokéball" x="0px" y="0px" viewBox="0 0 595.3 594.1" style="enable-background:new 0 0 595.3 594.1;" xml:space="preserve">
<style type="text/css">
  .st0{fill:#FFFFFF;}
  .st1{fill:#DFDFDF;}
  .st2{fill:#FF1C1C;}
  .st3{fill:#DF1818;}
</style>
<g id="Pokéball_1_">
  <g id="Colours">
    <path id="Down" class="st0" d="M297.6,380.9c-40.4,0-74.1-28.6-82.1-66.6H81.1c9.5,110.5,102.2,197.2,215.1,197.2    s205.7-86.7,215.1-197.2H379.7C371.7,352.4,338,380.9,297.6,380.9z"/>
    <path id="Shadow_Down" class="st1" d="M345.6,505.9c89.6-21,157.7-97.7,165.7-191.6h-53C453,399.5,408.3,471.7,345.6,505.9z"/>
    <path id="Center" class="st0" d="M347.1,297L347.1,297C347,297,347,297,347.1,297c-0.1-6.1-1.2-11.9-3.2-17.3    c-7-18.8-25.1-32.1-46.3-32.1s-39.3,13.4-46.3,32.1c-2,5.4-3.1,11.2-3.1,17.3c0,0,0,0,0,0h0.1c0,0,0,0,0,0    c0,6.1,1.1,11.9,3.1,17.3c7,18.8,25.1,32.1,46.3,32.1c21.2,0,39.3-13.4,46.3-32.1C346,309,347.1,303.1,347.1,297    C347.1,297,347.1,297,347.1,297z"/>
    <path id="Up" class="st2" d="M297.7,213.2c40.4,0,74.1,28.6,82.1,66.6h134.4C504.7,169.2,412,82.5,299,82.5S93.4,169.2,83.9,279.7    h131.7C223.6,241.7,257.3,213.2,297.7,213.2z"/>
    <path id="Shadow_Up" class="st3" d="M458.3,279.7h55.8c-8.2-95.5-78.6-173.3-170.5-192.6C407.4,120.8,452.9,193.7,458.3,279.7z"/>
  </g>
  <path id="Line" d="M299,82.5c113,0,205.7,86.7,215.1,197.2H379.7c-8-38-41.7-66.6-82.1-66.6c-40.4,0-74.1,28.6-82.1,66.6H83.9   C93.4,169.2,186.1,82.5,299,82.5z M343.9,279.7c2,5.4,3.1,11.2,3.1,17.3c0,0,0,0,0,0h0.1c0,0,0,0,0,0c0,6.1-1.1,11.9-3.1,17.3   c-7,18.8-25.1,32.1-46.3,32.1c-21.2,0-39.3-13.4-46.3-32.1c-2-5.4-3.1-11.2-3.1-17.3c0,0,0,0,0,0h-0.1c0,0,0,0,0,0   c0-6.1,1.1-11.9,3.1-17.3c7-18.8,25.1-32.1,46.3-32.1S336.9,261,343.9,279.7z M296.2,511.6c-113,0-205.7-86.7-215.1-197.2h134.4   c8,38,41.7,66.6,82.1,66.6s74.1-28.6,82.1-66.6h131.7C501.9,424.8,409.2,511.6,296.2,511.6z M297.6,41.3   C156.4,41.3,41.9,155.8,41.9,297s114.5,255.7,255.7,255.7S553.4,438.3,553.4,297S438.9,41.3,297.6,41.3z"/>
</g>
</svg>
  </svg></span>Loading cards…</div>`;
    statsBar.textContent = "Fetching from pokemontcg.io…";

    // Build the query string for the API
    // The API uses "q" parameter for filtering, e.g: q=name:charizard types:Fire artist:"Ken Sugimori"
    let q = "";
    if (query) q += `name:${query}*`;
    if (type)  q += (q ? " " : "") + `types:${type}`;
    if (artist) {
      // Si el nombre del artista tiene espacios usar comillas, si es solo una palabra usar *
      const term = artist.includes(" ") ? `artist:"${artist}"` : `artist:${artist}*`;
      q += (q ? " " : "") + term;
    }
    if (!q)    q = "name:*"; // get everything if no filter

   
    const sort = sortFilter.value || "name";

    const url = `${BASE_URL}?q=${encodeURIComponent(q)}&pageSize=32&orderBy=${sort}`;

    const headers = { "Content-Type": "application/json" };
    if (API_KEY) headers["X-Api-Key"] = API_KEY;

    try {
      // This is the actual API call using fetch()
      const response = await fetch(url, { headers });
      const data = await response.json(); // parse the JSON response

      if (!data.data || data.data.length === 0) {
        grid.innerHTML = `<div class="empty"> No cards found. Try a different search!</div>`;
        statsBar.textContent = "No results found.";
        return;
      }

      statsBar.textContent = `Showing ${data.data.length} of ${data.totalCount} cards found`;
      renderCards(data.data);

    } catch (err) {
      grid.innerHTML = `<div class="empty"> Error connecting to the API. Check your internet connection.<br><small>${err.message}</small></div>`;
      statsBar.textContent = "Error fetching data.";
    }
  }

  // Build the visual cards from the API data
  function renderCards(cards) {
    grid.innerHTML = "";
    cards.forEach(card => {
      const type = card.types ? card.types[0] : null;
      const typeClass = type ? `t-${type}` : "t-default";
      const artist = card.artist || "Unknown";
      const hp = card.hp ? `HP <b>${card.hp}</b>` : "";

      const imgSrc = card.images?.small || "";

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <div class="card-img-wrap">
          ${imgSrc
            ? `<img src="${imgSrc}" alt="${card.name}" loading="lazy" />`
            : `<div class="no-img">🎴</div>`}
          ${type ? `<span class="type-badge ${typeClass}">${type}</span>` : ""}
        </div>
        <div class="card-info">
          <div class="card-name">${card.name}</div>
          <div class="card-series">${card.set?.name || ""} · ${card.rarity || "—"}</div>
          <div class="artist-line">🎨 <span class="artist-click" data-artist="${artist.replace(/"/g, '&quot;')}">${artist}</span></div>
          ${hp ? `<div class="hp-line">${hp}</div>` : ""}
        </div>
      `;

      // Clicking the artist name searches for other cards by that artist
      // (stopPropagation evita que tambien se abra el modal de la carta)
      const artistEl = div.querySelector(".artist-click");
      artistEl.addEventListener("click", (e) => {
        e.stopPropagation();
        searchByArtist(artist);
      });

      // Clicking anywhere else on the card opens the detail modal
      div.addEventListener("click", () => openModal(card));
      grid.appendChild(div);
    });
  }

  // Open the detail modal for a card — aqui mostramos lo que NO se ve en la vista rapida:
  // habilidades, ataques, debilidad/resistencia/retirada y texto de la carta.
  function openModal(card) {
    document.getElementById("mImg").src = card.images?.large || card.images?.small || "";
    document.getElementById("mImg").alt = card.name;
    document.getElementById("mName").textContent = card.name;
    document.getElementById("mSet").textContent = `${card.set?.name || ""} · ${card.set?.series || ""}`;

    const artist = card.artist || "Unknown";

    // Badges con los datos rapidos (el artista es clickeable, igual que en la grilla)
    const badgesHtml = `
      <span class="badge badge-artist" id="mArtist">🎨 ${artist}</span>
      ${card.hp ? `<span class="badge">❤️ HP ${card.hp}</span>` : ""}
      ${card.types ? `<span class="badge">${card.types.join(", ")}</span>` : ""}
      <span class="badge">${card.rarity || "—"}</span>
      <span class="badge">#${card.number}/${card.set?.printedTotal || "?"}</span>
    `;
    document.getElementById("mBadges").innerHTML = badgesHtml;
    document.getElementById("mArtist").addEventListener("click", () => searchByArtist(artist));

    // Cuerpo con la info detallada (el "premio" de hacer click)
    let bodyHtml = "";

    if (card.abilities && card.abilities.length) {
      bodyHtml += `<div class="modal-section"><h4>Habilidades</h4>`;
      card.abilities.forEach(a => {
        bodyHtml += `<div class="ability"><strong>${a.name}</strong>${a.type ? `<span class="tag">${a.type}</span>` : ""}<p>${a.text || ""}</p></div>`;
      });
      bodyHtml += `</div>`;
    }

    if (card.attacks && card.attacks.length) {
      bodyHtml += `<div class="modal-section"><h4>Ataques</h4>`;
      card.attacks.forEach(a => {
        bodyHtml += `<div class="attack">
          <div class="attack-head"><strong>${a.name}</strong>${a.damage ? `<span class="dmg">${a.damage}</span>` : ""}</div>
          ${a.text ? `<p>${a.text}</p>` : ""}
        </div>`;
      });
      bodyHtml += `</div>`;
    }

    const hasWrr = (card.weaknesses && card.weaknesses.length) || (card.resistances && card.resistances.length) || (card.retreatCost && card.retreatCost.length);
    if (hasWrr) {
      bodyHtml += `<div class="modal-section wrr-row">`;
      if (card.weaknesses) card.weaknesses.forEach(w => bodyHtml += `<span class="wrr">⬇️ Debilidad: ${w.type} ${w.value}</span>`);
      if (card.resistances) card.resistances.forEach(r => bodyHtml += `<span class="wrr">🛡 Resistencia: ${r.type} ${r.value}</span>`);
      if (card.retreatCost && card.retreatCost.length) bodyHtml += `<span class="wrr">🏃 Retirada: ${card.retreatCost.length}</span>`;
      bodyHtml += `</div>`;
    }

    if (card.flavorText) {
      bodyHtml += `<p class="flavor">"${card.flavorText}"</p>`;
    }

    document.getElementById("mBody").innerHTML = bodyHtml || `<p class="flavor">Esta carta no tiene texto adicional disponible.</p>`;

    overlay.classList.add("open");
  }

  // Busca otras cartas del mismo artista (se llama al hacer click en su nombre)
  function searchByArtist(artist) {
    artistInput.value = artist;
    searchInput.value = "";
    typeFilter.value = "";
    overlay.classList.remove("open");
    fetchCards("", "", artist);
  }

  // Random search — picks a random popular Pokémon
  // todavia no lo arreglo xd
  function randomSearch() {
    const picks = ["Pikachu","Charizard","Mewtwo","Eevee","Gengar","Snorlax",
                   "Bulbasaur","Squirtle","Jigglypuff","Umbreon","Sylveon",
                   "Lucario","Garchomp","Rayquaza","Mew","Alakazam","Gyarados"];
    const pick = picks[Math.floor(Math.random() * picks.length)];
    searchInput.value = pick;
    artistInput.value = "";
    typeFilter.value = "";
    fetchCards(pick, "", "");
  }

  function runSearch() {
    fetchCards(searchInput.value.trim(), typeFilter.value, artistInput.value.trim());
  }

  // Event listeners
  document.getElementById("searchBtn").addEventListener("click", runSearch);
  document.getElementById("randomBtn").addEventListener("click", randomSearch);

  searchInput.addEventListener("keydown", e => { if (e.key === "Enter") runSearch(); });
  artistInput.addEventListener("keydown", e => { if (e.key === "Enter") runSearch(); });

  // Cambiar el orden o el tipo vuelve a buscar de inmediato (criterio de organizacion visible)
  sortFilter.addEventListener("change", runSearch);
  typeFilter.addEventListener("change", runSearch);

  document.getElementById("closeModal").addEventListener("click", () => {
    overlay.classList.remove("open");
  });

  overlay.addEventListener("click", e => {
    if (e.target === overlay) overlay.classList.remove("open");
  });

  // Carga cartas ordenadas por nombre al cargar la pagina
  fetchCards("", "", "");
</script>

</body>
</html>
